name: StocksBrain Pre-Market Quick Check

on:
  schedule:
    - cron: '0 9 * * 1-5'  # Mon-Fri 1:00 PM Dubai (UTC+4)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run quick check
        run: python quick_check.py

      - name: Commit output
        run: |
          git config user.name "StocksBrain Bot"
          git config user.email "bot@stocksbrain.local"
          git add output/
          git diff --cached --quiet || git commit -m "Pre-market check $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
