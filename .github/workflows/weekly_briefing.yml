name: StocksBrain Weekly Briefing

on:
  schedule:
    - cron: '0 2 * * 1'  # Mon 6:00 AM Dubai (UTC+4)
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests beautifulsoup4 pandas numpy

      - name: Run weekly briefing
        run: python -c "from orchestrator import main; main()" 2>&1

      - name: Commit output
        run: |
          git config user.name "StocksBrain Bot"
          git config user.email "bot@stocksbrain.local"
          git add output/
          git diff --cached --quiet || git commit -m "Weekly briefing $(date -u '+%Y-%m-%d')"
          git push
